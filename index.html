<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
  </head>
  <body>
    <div class="container">
      <h1>Weather Dashboard</h1>
      <div class="search-container">
        <input
          type="search"
          class="search-input"
          placeholder="Enter the City here...."
        />
        <button type="submit" class="search-btn">🔍</button>
      </div>
      <div class="card">
        <!-- Js-content -->
        <img src="" alt="" />
        <h2 class="temperature">32°C</h2>
        <p>London,Uk</p>
        <p>sunny</p>
        <p>overcast</p>

        <div class="readings">
          <div class="cols">
            <h3>78m/s</h3>
            <p>Wind Flow</p>
          </div>
          <div class="cols">
            <h3>52%</h3>
            <p>Precipitation</p>
          </div>
          <div class="cols">
            <h3>89%</h3>
            <p>Humidity</p>
          </div>
        </div>
      </div>

      <!-- history -->
    </div>
  </body>
</html>
