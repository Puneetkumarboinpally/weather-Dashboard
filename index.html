<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card-container">
      <h1 class="heading">Weather Dashboard</h1>

      <div class="search-container">
        <input class="search-input" placeholder="Enter city..." />

        <button class="submitBtn">🔍</button>
      </div>

      <div class="weather-main">
        <img class="weather-icon" />

        <h2 class="city-name">Sheffield</h2>

        <div class="temp"><span>18</span><small>°C</small></div>

        <div class="condition">Clouds</div>
      </div>

      <div class="weather-readings">
        <div class="cols">
          <h2>65%</h2>
          <p>Humidity</p>
        </div>

        <div class="cols">
          <h2>12 km/h</h2>
          <p>Wind</p>
        </div>

        <div class="cols">
          <h2>1015</h2>
          <p>Pressure</p>
        </div>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
