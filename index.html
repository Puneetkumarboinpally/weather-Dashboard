<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Weather Dashboard</h1>
      <div class="search-container">
        <input
          type="search"
          class="search-input"
          placeholder="Enter the City here...."
        />
        <button type="submit" class="search-btn">🔍</button>
      </div>
      <div class="card">
        <!-- Js-content -->
        <img class="weather-icon" src="" alt="" />
        <h2 class="temperature">32<small>°c</small></h2>
        <p class="city-name">London,Uk</p>
        <p class="condition">sunny</p>
        <p class="overcast">overcast cloudy</p>

        <div class="readings">
          <div class="cols">
            <h3>78m/s</h3>
            <p>Wind Flow</p>
          </div>
          <div class="cols">
            <h3>52%</h3>
            <p>Precipitation</p>
          </div>
          <div class="cols">
            <h3>89%</h3>
            <p>Humidity</p>
          </div>
        </div>
      </div>

      <!-- history -->
    </div>
    <script src="main.js"></script>
  </body>
</html>
